openapi: 3.0.3
info:
  title: Внутренний API микросервисов сервиса поиска работы
  version: 1.1.0
  description: >
    Спецификация внутренних HTTP-контрактов между микросервисами после
    декомпозиции monolith `lab1`. Здесь описаны только синхронные межсервисные
    вызовы, которые нужны для поддержки публичных ручек `lab1`, а не полный
    внешний REST API системы.
servers:
  - url: http://identity-service.internal
    description: identity-service
  - url: http://recruitment-service.internal
    description: recruitment-service
  - url: http://resume-service.internal
    description: resume-service
tags:
  - name: IdentityInternal
    description: >
      Внутренние вызовы в identity-service. Используются сервисами
      recruitment-service и resume-service для проверок пользователя и ролей.
  - name: RecruitmentInternal
    description: >
      Внутренние вызовы в recruitment-service. Используются в сценариях,
      связанных с компаниями, словарями, вакансиями, избранным, историей
      просмотров и откликами.
  - name: ResumeInternal
    description: >
      Внутренние вызовы в resume-service. Используются interaction-service при
      работе с откликами на вакансии.
paths:
  /internal/users/{userId}:
    get:
      tags: [IdentityInternal]
      operationId: getInternalUser
      summary: Получить пользователя по идентификатору
      description: >
        Нужен для межсервисной проверки существования пользователя и получения
        его базового профиля. Используется как supporting contract для сценариев,
        происходящих из публичных ручек `/companies/**`, `/employer-profiles/**`,
        `/vacancies/**`, `/resumes/**`.
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Пользователь найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalUserResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /internal/users/{userId}/roles:
    get:
      tags: [IdentityInternal]
      operationId: getInternalUserRoles
      summary: Получить роли пользователя
      description: >
        Используется для авторизационных проверок, возникающих после разбиения
        публичных ручек `/users/{userId}/roles`, `/roles`, `/companies/**`,
        `/employer-profiles/**`, `/vacancies/**`, `/resumes/**`.
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Роли пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRolesResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /internal/users/{userId}/role-check:
    post:
      tags: [IdentityInternal]
      operationId: checkInternalUserRoles
      summary: Проверить наличие одной из ролей
      description: >
        Оптимизированная проверка ролей для сервисов, которым не нужен полный
        профиль пользователя. Применяется в сценариях, идущих из публичных
        ручек `/companies/**`, `/employer-profiles/**`, `/vacancies/**`,
        `/resumes/**`.
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleCheckRequest'
      responses:
        '200':
          description: Результат проверки ролей
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleCheckResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  /internal/employer-profiles/by-user/{userId}:
    get:
      tags: [RecruitmentInternal]
      operationId: getEmployerProfileByUserId
      summary: Получить employer profile по userId
      description: >
        Используется для сценариев, связанных с публичными ручками
        `/vacancies`, `/vacancies/my`, `/vacancies/{vacancyId}/assignments`,
        `/vacancy-assignments/{assignmentId}`, когда другому сервису нужно
        понять, к какой компании относится работодатель.
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Профиль работодателя найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalEmployerProfileResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /internal/employer-profiles/{employerProfileId}:
    get:
      tags: [RecruitmentInternal]
      operationId: getEmployerProfileById
      summary: Получить employer profile по идентификатору профиля
      description: >
        Поддерживающий внутренний контракт для сценариев, происходящих из
        публичных ручек `/employer-profiles/**`, `/vacancies/**`,
        `/vacancy-assignments/{assignmentId}`.
      parameters:
        - $ref: '#/components/parameters/EmployerProfileId'
      responses:
        '200':
          description: Профиль работодателя найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalEmployerProfileResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /internal/companies/{companyId}:
    get:
      tags: [RecruitmentInternal]
      operationId: getInternalCompany
      summary: Получить компанию по идентификатору
      description: >
        Поддерживающий контракт для сценариев, связанных с публичными ручками
        `/companies/**`, `/employer-profiles/**`, `/vacancies/**`.
      parameters:
        - $ref: '#/components/parameters/CompanyId'
      responses:
        '200':
          description: Компания найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalCompanyResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /internal/reference/industries/{industryId}:
    get:
      tags: [RecruitmentInternal]
      operationId: getInternalIndustry
      summary: Получить отрасль по идентификатору
      description: >
        Справочный контракт recruitment-service. Используется в сценариях,
        порождённых публичными ручками `/industries/**` и `/vacancies/**`.
      parameters:
        - $ref: '#/components/parameters/IndustryId'
      responses:
        '200':
          description: Отрасль найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /internal/reference/experience-levels/{experienceLevelId}:
    get:
      tags: [RecruitmentInternal]
      operationId: getInternalExperienceLevel
      summary: Получить уровень опыта по идентификатору
      description: >
        Справочный контракт recruitment-service. Используется в сценариях,
        порождённых публичными ручками `/experience-levels/**` и `/vacancies/**`.
      parameters:
        - $ref: '#/components/parameters/ExperienceLevelId'
      responses:
        '200':
          description: Уровень опыта найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /internal/reference/skills/resolve:
    post:
      tags: [RecruitmentInternal]
      operationId: resolveInternalSkills
      summary: Разрешить список skillId в справочные сущности
      description: >
        Используется прежде всего resume-service и recruitment-service в
        сценариях, идущих из публичных ручек `/skills/**`, `/resumes/**`,
        `/vacancies/**`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillResolveRequest'
      responses:
        '200':
          description: Список навыков разрешён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillResolveResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /internal/reference/validate:
    post:
      tags: [RecruitmentInternal]
      operationId: validateInternalReferences
      summary: Проверить набор справочных идентификаторов
      description: >
        Используется как компактный внутренний контракт для create/update
        сценариев, соответствующих публичным ручкам `/vacancies/**` и
        `/resumes/**`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReferenceValidationRequest'
      responses:
        '200':
          description: Результат проверки справочных значений
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceValidationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /internal/vacancies/{vacancyId}/publication:
    get:
      tags: [RecruitmentInternal]
      operationId: getVacancyPublicationStatus
      summary: Проверить публикационный статус вакансии
      description: >
        Используется interaction-service для логики, происходящей из публичных
        ручек `POST /vacancies/{vacancyId}/applications`,
        `POST /vacancies/favorites/{vacancyId}`,
        `POST /vacancies/history/{vacancyId}`.
      parameters:
        - $ref: '#/components/parameters/VacancyId'
      responses:
        '200':
          description: Статус вакансии получен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyPublicationResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /internal/vacancies/{vacancyId}/interaction-context:
    get:
      tags: [RecruitmentInternal]
      operationId: getVacancyInteractionContext
      summary: Получить контекст вакансии для interaction-service
      description: >
        Используется interaction-service для публичных ручек
        `/vacancies/{vacancyId}/applications`, `/vacancies/favorites/**`,
        `/vacancies/history/**`.
      parameters:
        - $ref: '#/components/parameters/VacancyId'
      responses:
        '200':
          description: Контекст вакансии получен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyInteractionContextResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /internal/vacancies/{vacancyId}/hr-access:
    get:
      tags: [RecruitmentInternal]
      operationId: checkVacancyHrAccess
      summary: Проверить, может ли пользователь-работодатель управлять откликами
      description: >
        Используется interaction-service для сценариев, соответствующих
        публичным ручкам `GET /vacancies/{vacancyId}/applications` и
        `PATCH /applications/{applicationId}/status`.
      parameters:
        - $ref: '#/components/parameters/VacancyId'
        - $ref: '#/components/parameters/UserIdQuery'
      responses:
        '200':
          description: Результат проверки доступа
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HrAccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /internal/resumes/{resumeId}:
    get:
      tags: [ResumeInternal]
      operationId: getInternalResume
      summary: Получить краткий контекст резюме
      description: >
        Используется interaction-service для сценария публичной ручки
        `POST /vacancies/{vacancyId}/applications`.
      parameters:
        - $ref: '#/components/parameters/ResumeId'
      responses:
        '200':
          description: Резюме найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalResumeResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /internal/resumes/{resumeId}/ownership:
    get:
      tags: [ResumeInternal]
      operationId: checkResumeOwnership
      summary: Проверить принадлежность резюме пользователю
      description: >
        Используется interaction-service для сценария публичной ручки
        `POST /vacancies/{vacancyId}/applications`.
      parameters:
        - $ref: '#/components/parameters/ResumeId'
        - $ref: '#/components/parameters/UserIdQuery'
      responses:
        '200':
          description: Результат проверки владения
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnershipCheckResponse'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserIdQuery:
      name: userId
      in: query
      required: true
      schema:
        type: string
        format: uuid
    EmployerProfileId:
      name: employerProfileId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CompanyId:
      name: companyId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IndustryId:
      name: industryId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ExperienceLevelId:
      name: experienceLevelId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VacancyId:
      name: vacancyId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ResumeId:
      name: resumeId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Ошибка валидации
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    InternalUserResponse:
      type: object
      required: [id, email, phone, isVerified, roles]
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        middleName:
          type: string
          nullable: true
        email:
          type: string
          format: email
        phone:
          type: string
        isVerified:
          type: boolean
        roles:
          type: array
          items:
            type: string

    UserRolesResponse:
      type: object
      required: [userId, roles]
      properties:
        userId:
          type: string
          format: uuid
        roles:
          type: array
          items:
            type: string

    RoleCheckRequest:
      type: object
      required: [requiredRoles]
      properties:
        requiredRoles:
          type: array
          items:
            type: string

    RoleCheckResponse:
      type: object
      required: [userId, matched, roles]
      properties:
        userId:
          type: string
          format: uuid
        matched:
          type: boolean
        roles:
          type: array
          items:
            type: string

    InternalEmployerProfileResponse:
      type: object
      required: [id, userId, companyId, position]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        companyId:
          type: string
          format: uuid
        position:
          type: string

    InternalCompanyResponse:
      type: object
      required: [id, title]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        industryHint:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        employeeCount:
          type: number
          nullable: true

    ReferenceItemResponse:
      type: object
      required: [id, code, displayName, active]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        displayName:
          type: string
        active:
          type: boolean

    SkillResolveRequest:
      type: object
      required: [skillIds]
      properties:
        skillIds:
          type: array
          items:
            type: string
            format: uuid

    SkillResolveResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReferenceItemResponse'

    ReferenceValidationRequest:
      type: object
      properties:
        industryId:
          type: string
          format: uuid
        experienceLevelId:
          type: string
          format: uuid
        skillIds:
          type: array
          items:
            type: string
            format: uuid

    ReferenceValidationResponse:
      type: object
      required: [valid]
      properties:
        valid:
          type: boolean
        industryFound:
          type: boolean
        experienceLevelFound:
          type: boolean
        missingSkillIds:
          type: array
          items:
            type: string
            format: uuid

    VacancyPublicationResponse:
      type: object
      required: [vacancyId, status, published]
      properties:
        vacancyId:
          type: string
          format: uuid
        status:
          type: string
        published:
          type: boolean

    VacancyInteractionContextResponse:
      type: object
      required: [vacancyId, companyId, status, published]
      properties:
        vacancyId:
          type: string
          format: uuid
        companyId:
          type: string
          format: uuid
        status:
          type: string
        published:
          type: boolean
        primaryEmployerProfileId:
          type: string
          format: uuid
          nullable: true

    HrAccessResponse:
      type: object
      required: [vacancyId, userId, allowed]
      properties:
        vacancyId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        allowed:
          type: boolean
        employerProfileId:
          type: string
          format: uuid
          nullable: true
        companyId:
          type: string
          format: uuid
          nullable: true

    InternalResumeResponse:
      type: object
      required: [id, userId, title, desiredPosition, status]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        title:
          type: string
        desiredPosition:
          type: string
        status:
          type: string

    OwnershipCheckResponse:
      type: object
      required: [resourceId, userId, owned]
      properties:
        resourceId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        owned:
          type: boolean

    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'

    ErrorDetail:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
        message:
          type: string
