openapi: 3.0.3
info:
  title: API сервиса поиска работы
  version: 1.0.0
  description: >
    REST API сервиса поиска работы, синхронизированное с текущей
    ER-моделью из hw1.drawio.
servers:
  - url: http://localhost:8080/api/v1
    description: Локальный сервер

tags:
  - name: Auth
  - name: Users
  - name: Companies
  - name: EmployerProfiles
  - name: Dictionaries
  - name: Resumes
  - name: Vacancies
  - name: VacancyAssignments
  - name: Applications
  - name: Favorites
  - name: VacancyViews

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Регистрация пользователя
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Пользователь создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Вход в систему
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешная аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /users/me:
    get:
      tags: [Users]
      summary: Профиль текущего пользователя
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Текущий пользователь
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    patch:
      tags: [Users]
      summary: Обновление текущего пользователя
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Пользователь обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /companies:
    post:
      tags: [Companies]
      summary: Создание компании
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyCreateRequest'
      responses:
        '201':
          description: Компания создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /companies/{company_id}:
    parameters:
      - $ref: '#/components/parameters/CompanyId'
    get:
      tags: [Companies]
      summary: Получение компании
      responses:
        '200':
          description: Данные компании
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [Companies]
      summary: Обновление компании
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyUpdateRequest'
      responses:
        '200':
          description: Компания обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /employer-profiles:
    post:
      tags: [EmployerProfiles]
      summary: Создание профиля работодателя
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployerProfileCreateRequest'
      responses:
        '201':
          description: Профиль работодателя создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerProfileResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /employer-profiles/me:
    get:
      tags: [EmployerProfiles]
      summary: Профиль текущего работодателя
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Текущий профиль работодателя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerProfileResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [EmployerProfiles]
      summary: Обновление текущего профиля работодателя
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployerProfileUpdateRequest'
      responses:
        '200':
          description: Профиль работодателя обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerProfileResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /industries:
    get:
      tags: [Dictionaries]
      summary: Список отраслей
      responses:
        '200':
          description: Список активных отраслей
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DictionaryItemsResponse'

  /experience-levels:
    get:
      tags: [Dictionaries]
      summary: Список уровней опыта
      responses:
        '200':
          description: Список активных уровней опыта
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DictionaryItemsResponse'

  /resumes:
    get:
      tags: [Resumes]
      summary: Список резюме текущего соискателя
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/ResumeSortBy'
        - $ref: '#/components/parameters/SortDir'
      responses:
        '200':
          description: Список резюме
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumePageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    post:
      tags: [Resumes]
      summary: Создание резюме
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResumeCreateRequest'
      responses:
        '201':
          description: Резюме создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /resumes/{resume_id}:
    parameters:
      - $ref: '#/components/parameters/ResumeId'
    get:
      tags: [Resumes]
      summary: Получение резюме
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Данные резюме
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [Resumes]
      summary: Обновление резюме
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResumeUpdateRequest'
      responses:
        '200':
          description: Резюме обновлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags: [Resumes]
      summary: Удаление резюме
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Резюме удалено
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /vacancies:
    get:
      tags: [Vacancies]
      summary: Публичный поиск вакансий
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/VacancySortBy'
        - $ref: '#/components/parameters/SortDir'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/City'
        - $ref: '#/components/parameters/IndustryIdQuery'
        - $ref: '#/components/parameters/ExperienceLevelIdQuery'
        - $ref: '#/components/parameters/EmploymentTypeQuery'
        - $ref: '#/components/parameters/WorkFormatQuery'
        - $ref: '#/components/parameters/SalaryFromQuery'
        - $ref: '#/components/parameters/SalaryToQuery'
      responses:
        '200':
          description: Список опубликованных вакансий
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyPageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
    post:
      tags: [Vacancies]
      summary: Создание вакансии
      description: >
        Вакансия создается от имени компании. После создания текущему работодателю
        автоматически добавляется `PRIMARY`-назначение в `vacancy_assignment`, а его
        `public_id` записывается в `vacancy_assignment_id` вакансии.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VacancyCreateRequest'
      responses:
        '201':
          description: Вакансия создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /vacancies/my:
    get:
      tags: [Vacancies]
      summary: Вакансии, назначенные текущему работодателю
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/VacancySortBy'
        - $ref: '#/components/parameters/SortDir'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/City'
        - $ref: '#/components/parameters/IndustryIdQuery'
        - $ref: '#/components/parameters/ExperienceLevelIdQuery'
        - $ref: '#/components/parameters/EmploymentTypeQuery'
        - $ref: '#/components/parameters/WorkFormatQuery'
        - $ref: '#/components/parameters/PublicationStatusQuery'
      responses:
        '200':
          description: Список вакансий работодателя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyPageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /vacancies/{vacancy_id}:
    parameters:
      - $ref: '#/components/parameters/VacancyId'
    get:
      tags: [Vacancies]
      summary: Детали опубликованной вакансии
      responses:
        '200':
          description: Карточка вакансии
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [Vacancies]
      summary: Обновление вакансии
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VacancyUpdateRequest'
      responses:
        '200':
          description: Вакансия обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags: [Vacancies]
      summary: Удаление вакансии
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Вакансия удалена
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /vacancies/{vacancy_id}/assignments:
    parameters:
      - $ref: '#/components/parameters/VacancyId'
    get:
      tags: [VacancyAssignments]
      summary: Список HR-назначений вакансии
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Назначения по вакансии
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyAssignmentItemsResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    post:
      tags: [VacancyAssignments]
      summary: Добавление HR-назначения к вакансии
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VacancyAssignmentCreateRequest'
      responses:
        '201':
          description: Назначение создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyAssignmentResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /vacancy-assignments/{assignment_id}:
    parameters:
      - $ref: '#/components/parameters/AssignmentId'
    patch:
      tags: [VacancyAssignments]
      summary: Обновление роли HR-назначения
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VacancyAssignmentUpdateRequest'
      responses:
        '200':
          description: Назначение обновлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyAssignmentResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags: [VacancyAssignments]
      summary: Удаление HR-назначения
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Назначение удалено
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /vacancies/{vacancy_id}/applications:
    parameters:
      - $ref: '#/components/parameters/VacancyId'
    post:
      tags: [Applications]
      summary: Отклик на вакансию
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationCreateRequest'
      responses:
        '201':
          description: Отклик создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
    get:
      tags: [Applications]
      summary: Отклики по вакансии
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Список откликов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationPageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /applications/my:
    get:
      tags: [Applications]
      summary: Отклики текущего соискателя
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Список моих откликов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationPageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /applications/{application_id}/status:
    parameters:
      - $ref: '#/components/parameters/ApplicationId'
    patch:
      tags: [Applications]
      summary: Изменение статуса отклика
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationStatusUpdateRequest'
      responses:
        '200':
          description: Статус отклика обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /favorites:
    get:
      tags: [Favorites]
      summary: Избранные вакансии текущего пользователя
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Список избранных вакансий
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriteVacancyPageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /favorites/{vacancy_id}:
    parameters:
      - $ref: '#/components/parameters/VacancyId'
    post:
      tags: [Favorites]
      summary: Добавление вакансии в избранное
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Вакансия добавлена в избранное
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriteVacancyResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
    delete:
      tags: [Favorites]
      summary: Удаление вакансии из избранного
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Вакансия удалена из избранного
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /vacancy-views:
    get:
      tags: [VacancyViews]
      summary: История просмотров текущего пользователя
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: История просмотров
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyViewPageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /vacancies/{vacancy_id}/views:
    parameters:
      - $ref: '#/components/parameters/VacancyId'
    post:
      tags: [VacancyViews]
      summary: Создание записи о просмотре вакансии
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Просмотр сохранен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyViewResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    CompanyId:
      name: company_id
      in: path
      required: true
