spring:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml
  jackson:
    property-naming-strategy: SNAKE_CASE

server:
  servlet:
    context-path: /api/v1
  tomcat:
    relaxed-query-chars: '[,]'

app:
  security:
    jwt:
      secret: test-secret-test-secret-test-secret
      access-ttl-minutes: 60
