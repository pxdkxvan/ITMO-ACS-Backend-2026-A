databaseChangeLog:
  - changeSet:
      id: 001-init-vacancy-schema
      author: codex
      changes:
        - createTable:
            tableName: industries
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: code, type: varchar(255), constraints: { nullable: false, unique: true } }
              - column: { name: display_name, type: varchar(255), constraints: { nullable: false } }
        - createTable:
            tableName: experience_levels
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: code, type: varchar(255), constraints: { nullable: false, unique: true } }
              - column: { name: display_name, type: varchar(255), constraints: { nullable: false } }
        - createTable:
            tableName: vacancies
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: company_id, type: uuid, constraints: { nullable: false } }
              - column: { name: created_by_user_id, type: uuid, constraints: { nullable: false } }
              - column: { name: title, type: varchar(255), constraints: { nullable: false } }
              - column: { name: description, type: varchar(4000), constraints: { nullable: false } }
              - column: { name: country, type: varchar(255), constraints: { nullable: false } }
              - column: { name: city, type: varchar(255), constraints: { nullable: false } }
              - column: { name: metro, type: varchar(255) }
              - column: { name: salary_from, type: "numeric(19,2)" }
              - column: { name: salary_to, type: "numeric(19,2)" }
              - column: { name: currency, type: varchar(32) }
              - column: { name: industry_code, type: varchar(255), constraints: { nullable: false } }
              - column: { name: experience_level_code, type: varchar(255), constraints: { nullable: false } }
              - column: { name: employment_type, type: varchar(64), constraints: { nullable: false } }
              - column: { name: work_format, type: varchar(64), constraints: { nullable: false } }
              - column: { name: education_level, type: varchar(255) }
              - column: { name: company_name, type: varchar(255) }
              - column: { name: status, type: varchar(64), constraints: { nullable: false } }
              - column: { name: published_at, type: "timestamp with time zone" }
              - column: { name: accepts_applications, type: boolean, constraints: { nullable: false } }
              - column: { name: skills_csv, type: varchar(4000), constraints: { nullable: false } }
        - createTable:
            tableName: vacancy_assignments
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: vacancy_id, type: uuid, constraints: { nullable: false } }
              - column: { name: employer_profile_id, type: uuid, constraints: { nullable: false } }
              - column: { name: employer_user_id, type: uuid, constraints: { nullable: false } }
              - column: { name: assignment_role, type: varchar(64), constraints: { nullable: false } }
