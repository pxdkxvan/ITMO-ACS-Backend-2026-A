services:
  vacancy-db:
    image: postgres:17
    container_name: lab23-vacancy-db
    environment:
      POSTGRES_DB: vacancy_db
      POSTGRES_USER: vacancy
      POSTGRES_PASSWORD: vacancy
    ports:
      - "54325:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vacancy -d vacancy_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - lab23-network

  vacancy-service:
    build: .
    container_name: lab23-vacancy-service
    entrypoint: ["java", "-Xms32m", "-Xmx256m", "-jar", "/app/app.jar"]
    environment:
      SERVER_PORT: 8084
      DB_URL: jdbc:postgresql://vacancy-db:5432/vacancy_db
      DB_USERNAME: vacancy
      DB_PASSWORD: vacancy
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: 5d425331c66b17a28480fd38d2128e8350a24d535f23061c8d86bce66bdbcc44
      SERVICE_TOKEN: df0670418aa48ee9017ad05da2a1367b04e96686e5fb1bb0
      COMPANY_URL: http://company-service:8083
    depends_on:
      vacancy-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8084:8084"
    networks:
      - lab23-network

networks:
  lab23-network:
    name: lab23-network
