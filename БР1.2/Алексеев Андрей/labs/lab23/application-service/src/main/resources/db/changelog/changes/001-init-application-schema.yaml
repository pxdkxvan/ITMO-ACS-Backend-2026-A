databaseChangeLog:
  - changeSet:
      id: 001-init-application-schema
      author: codex
      changes:
        - createTable:
            tableName: applications
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: vacancy_id, type: uuid, constraints: { nullable: false } }
              - column: { name: resume_id, type: uuid, constraints: { nullable: false } }
              - column: { name: applicant_user_id, type: uuid, constraints: { nullable: false } }
              - column: { name: status, type: varchar(64), constraints: { nullable: false } }
              - column: { name: cover_letter, type: varchar(4000) }
              - column: { name: created_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: status_changed_at, type: timestamp with time zone, constraints: { nullable: false } }
        - createTable:
            tableName: interview_invitations
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: application_id, type: uuid, constraints: { nullable: false } }
              - column: { name: scheduled_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: format, type: varchar(64), constraints: { nullable: false } }
              - column: { name: notes, type: varchar(4000) }
              - column: { name: created_at, type: timestamp with time zone, constraints: { nullable: false } }
        - addForeignKeyConstraint:
            baseTableName: interview_invitations
            baseColumnNames: application_id
            referencedTableName: applications
            referencedColumnNames: id
            constraintName: fk_interview_invitation_application
