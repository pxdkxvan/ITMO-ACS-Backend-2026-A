databaseChangeLog:
  - changeSet:
      id: 001-init-auth-schema
      author: codex
      changes:
        - createTable:
            tableName: credentials
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: refresh_token
                  type: varchar(255)
        - createIndex:
            tableName: credentials
            indexName: idx_credentials_refresh_token
            columns:
              - column:
                  name: refresh_token
