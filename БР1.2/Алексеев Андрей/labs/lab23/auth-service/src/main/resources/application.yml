spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${DB_USERNAME:auth}
    password: ${DB_PASSWORD:auth}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jackson:
    property-naming-strategy: SNAKE_CASE
  cloud:
    openfeign:
      client:
        config:
          default:
            loggerLevel: basic

server:
  port: ${SERVER_PORT:8081}

app:
  security:
    jwt-secret: ${JWT_SECRET:5d425331c66b17a28480fd38d2128e8350a24d535f23061c8d86bce66bdbcc44}
    service-token: ${SERVICE_TOKEN:df0670418aa48ee9017ad05da2a1367b04e96686e5fb1bb0}
    access-ttl-minutes: 120
  clients:
    user-url: ${USER_URL:http://localhost:8082}
