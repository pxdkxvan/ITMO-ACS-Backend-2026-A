services:
  notification-db:
    image: postgres:17
    container_name: lab23-notification-db
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: notification
    ports:
      - "55436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification -d notification_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - lab23-network

  notification-service:
    build: .
    container_name: lab23-notification-service
    entrypoint: ["java", "-Xms32m", "-Xmx256m", "-jar", "/app/app.jar"]
    environment:
      SERVER_PORT: 8089
      DB_URL: jdbc:postgresql://notification-db:5432/notification_db
      DB_USERNAME: notification
      DB_PASSWORD: notification
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: 5d425331c66b17a28480fd38d2128e8350a24d535f23061c8d86bce66bdbcc44
      IDENTITY_URL: http://user-service:8082
      RESUME_URL: http://resume-service:8086
      INTERACTION_URL: http://interaction-service:8088
    depends_on:
      notification-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8089:8089"
    networks:
      - lab23-network

networks:
  lab23-network:
    name: lab23-network
