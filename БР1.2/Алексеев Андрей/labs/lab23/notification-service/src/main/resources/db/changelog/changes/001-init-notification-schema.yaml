databaseChangeLog:
  - changeSet:
      id: 001-init-notification-schema
      author: codex
      changes:
        - createTable:
            tableName: notifications
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: user_id, type: uuid, constraints: { nullable: false } }
              - column: { name: type, type: varchar(64), constraints: { nullable: false } }
              - column: { name: title, type: varchar(255), constraints: { nullable: false } }
              - column: { name: body, type: varchar(2000), constraints: { nullable: false } }
              - column: { name: created_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: read_at, type: timestamp with time zone }
