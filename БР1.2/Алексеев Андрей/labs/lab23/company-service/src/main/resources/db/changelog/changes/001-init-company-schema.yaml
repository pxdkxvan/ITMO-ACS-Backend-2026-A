databaseChangeLog:
  - changeSet:
      id: 001-init-company-schema
      author: codex
      changes:
        - createTable:
            tableName: companies
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: title, type: varchar(255), constraints: { nullable: false } }
              - column: { name: owner_user_id, type: uuid, constraints: { nullable: false } }
              - column: { name: description, type: varchar(255) }
              - column: { name: website, type: varchar(255) }
              - column: { name: industry_hint, type: varchar(255) }
              - column: { name: address, type: varchar(255) }
              - column: { name: employee_count, type: bigint }
        - createTable:
            tableName: employer_profiles
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: user_id, type: uuid, constraints: { nullable: false, unique: true } }
              - column: { name: company_id, type: uuid, constraints: { nullable: false } }
              - column: { name: position, type: varchar(255), constraints: { nullable: false } }
