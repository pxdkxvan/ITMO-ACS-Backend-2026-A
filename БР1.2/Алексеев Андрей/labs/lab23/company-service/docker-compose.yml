services:
  company-db:
    image: postgres:17
    container_name: lab23-company-db
    environment:
      POSTGRES_DB: company_db
      POSTGRES_USER: company
      POSTGRES_PASSWORD: company
    ports:
      - "54324:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U company -d company_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - lab23-network

  company-service:
    build: .
    container_name: lab23-company-service
    entrypoint: ["java", "-Xms32m", "-Xmx256m", "-jar", "/app/app.jar"]
    environment:
      SERVER_PORT: 8083
      DB_URL: jdbc:postgresql://company-db:5432/company_db
      DB_USERNAME: company
      DB_PASSWORD: company
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: 5d425331c66b17a28480fd38d2128e8350a24d535f23061c8d86bce66bdbcc44
      SERVICE_TOKEN: df0670418aa48ee9017ad05da2a1367b04e96686e5fb1bb0
    depends_on:
      company-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    networks:
      - lab23-network

networks:
  lab23-network:
    name: lab23-network
