databaseChangeLog:
  - changeSet:
      id: 001-init-user-schema
      author: codex
      changes:
        - createTable:
            tableName: roles
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: varchar(255), constraints: { nullable: false, unique: true } }
              - column: { name: description, type: varchar(255) }
        - createTable:
            tableName: user_accounts
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: first_name, type: varchar(255), constraints: { nullable: false } }
              - column: { name: last_name, type: varchar(255), constraints: { nullable: false } }
              - column: { name: middle_name, type: varchar(255) }
              - column: { name: email, type: varchar(255), constraints: { nullable: false, unique: true } }
              - column: { name: phone, type: varchar(255), constraints: { nullable: false, unique: true } }
              - column: { name: active, type: boolean, constraints: { nullable: false } }
        - createTable:
            tableName: user_roles
            columns:
              - column: { name: user_id, type: uuid, constraints: { nullable: false } }
              - column: { name: role_id, type: uuid, constraints: { nullable: false } }
        - addPrimaryKey:
            tableName: user_roles
            columnNames: user_id, role_id
            constraintName: pk_user_roles
        - addForeignKeyConstraint:
            baseTableName: user_roles
            baseColumnNames: user_id
            referencedTableName: user_accounts
            referencedColumnNames: id
            constraintName: fk_user_roles_user
        - addForeignKeyConstraint:
            baseTableName: user_roles
            baseColumnNames: role_id
            referencedTableName: roles
            referencedColumnNames: id
            constraintName: fk_user_roles_role
