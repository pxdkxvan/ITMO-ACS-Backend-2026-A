databaseChangeLog:
  - changeSet:
      id: 001-init-interaction-schema
      author: codex
      changes:
        - createTable:
            tableName: favorite_vacancies
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: user_id, type: uuid, constraints: { nullable: false } }
              - column: { name: vacancy_id, type: uuid, constraints: { nullable: false } }
              - column: { name: created_at, type: timestamp with time zone, constraints: { nullable: false } }
        - createTable:
            tableName: vacancy_views
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: user_id, type: uuid, constraints: { nullable: false } }
              - column: { name: vacancy_id, type: uuid, constraints: { nullable: false } }
              - column: { name: created_at, type: timestamp with time zone, constraints: { nullable: false } }
        - addUniqueConstraint:
            tableName: favorite_vacancies
            columnNames: user_id, vacancy_id
            constraintName: uk_favorite_user_vacancy
