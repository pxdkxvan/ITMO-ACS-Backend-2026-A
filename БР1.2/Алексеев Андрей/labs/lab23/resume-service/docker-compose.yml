services:
  resume-db:
    image: postgres:17
    container_name: lab23-resume-db
    environment:
      POSTGRES_DB: resume_db
      POSTGRES_USER: resume
      POSTGRES_PASSWORD: resume
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resume -d resume_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - lab23-network

  resume-service:
    build: .
    container_name: lab23-resume-service
    entrypoint: ["java", "-Xms32m", "-Xmx256m", "-jar", "/app/app.jar"]
    environment:
      SERVER_PORT: 8086
      DB_URL: jdbc:postgresql://resume-db:5432/resume_db
      DB_USERNAME: resume
      DB_PASSWORD: resume
      JWT_SECRET: 5d425331c66b17a28480fd38d2128e8350a24d535f23061c8d86bce66bdbcc44
      SERVICE_TOKEN: df0670418aa48ee9017ad05da2a1367b04e96686e5fb1bb0
    depends_on:
      resume-db:
        condition: service_healthy
    ports:
      - "8086:8086"
    networks:
      - lab23-network

networks:
  lab23-network:
    name: lab23-network
