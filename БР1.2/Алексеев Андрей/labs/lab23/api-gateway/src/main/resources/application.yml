spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth
          uri: ${AUTH_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - RewritePath=/api/v1/auth/(?<segment>.*), /auth/${segment}
        - id: user
          uri: ${USER_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/users/**,/api/v1/roles,/api/v1/roles/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /${segment}
        - id: company
          uri: ${COMPANY_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/companies,/api/v1/companies/**,/api/v1/employer-profiles,/api/v1/employer-profiles/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /${segment}
        - id: vacancy-search
          uri: ${SEARCH_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/vacancies
            - Method=GET
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /${segment}
        - id: vacancy-search-explicit
          uri: ${SEARCH_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/search/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /${segment}
        - id: application
          uri: ${APPLICATION_URL:http://localhost:8087}
          predicates:
            - Path=/api/v1/applications/**,/api/v1/vacancies/*/applications
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /${segment}
        - id: interaction
          uri: ${INTERACTION_URL:http://localhost:8088}
          predicates:
            - Path=/api/v1/vacancies/favorites,/api/v1/vacancies/favorites/**,/api/v1/vacancies/history,/api/v1/vacancies/history/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /${segment}
        - id: vacancy-domain
          uri: ${VACANCY_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/vacancies/**,/api/v1/vacancy-assignments/**,/api/v1/industries,/api/v1/industries/**,/api/v1/experience-levels,/api/v1/experience-levels/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /${segment}
        - id: resume
          uri: ${RESUME_URL:http://localhost:8086}
          predicates:
            - Path=/api/v1/resumes,/api/v1/resumes/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /${segment}
        - id: notification
          uri: ${NOTIFICATION_URL:http://localhost:8089}
          predicates:
            - Path=/api/v1/notifications,/api/v1/notifications/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /${segment}
        - id: auth-docs
          uri: ${AUTH_URL:http://localhost:8081}
          predicates:
            - Path=/auth-docs/v3/api-docs
          filters:
            - RewritePath=/auth-docs/(?<segment>.*), /${segment}
        - id: user-docs
          uri: ${USER_URL:http://localhost:8082}
          predicates:
            - Path=/user-docs/v3/api-docs
          filters:
            - RewritePath=/user-docs/(?<segment>.*), /${segment}
        - id: company-docs
          uri: ${COMPANY_URL:http://localhost:8083}
          predicates:
            - Path=/company-docs/v3/api-docs
          filters:
            - RewritePath=/company-docs/(?<segment>.*), /${segment}
        - id: vacancy-docs
          uri: ${VACANCY_URL:http://localhost:8084}
          predicates:
            - Path=/vacancy-docs/v3/api-docs
          filters:
            - RewritePath=/vacancy-docs/(?<segment>.*), /${segment}
        - id: search-docs
          uri: ${SEARCH_URL:http://localhost:8085}
          predicates:
            - Path=/search-docs/v3/api-docs
          filters:
            - RewritePath=/search-docs/(?<segment>.*), /${segment}
        - id: resume-docs
          uri: ${RESUME_URL:http://localhost:8086}
          predicates:
            - Path=/resume-docs/v3/api-docs
          filters:
            - RewritePath=/resume-docs/(?<segment>.*), /${segment}
        - id: application-docs
          uri: ${APPLICATION_URL:http://localhost:8087}
          predicates:
            - Path=/application-docs/v3/api-docs
          filters:
            - RewritePath=/application-docs/(?<segment>.*), /${segment}
        - id: interaction-docs
          uri: ${INTERACTION_URL:http://localhost:8088}
          predicates:
            - Path=/interaction-docs/v3/api-docs
          filters:
            - RewritePath=/interaction-docs/(?<segment>.*), /${segment}
        - id: notification-docs
          uri: ${NOTIFICATION_URL:http://localhost:8089}
          predicates:
            - Path=/notification-docs/v3/api-docs
          filters:
            - RewritePath=/notification-docs/(?<segment>.*), /${segment}

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: auth-service
        url: /auth-docs/v3/api-docs
      - name: user-service
        url: /user-docs/v3/api-docs
      - name: company-service
        url: /company-docs/v3/api-docs
      - name: vacancy-service
        url: /vacancy-docs/v3/api-docs
      - name: search-service
        url: /search-docs/v3/api-docs
      - name: resume-service
        url: /resume-docs/v3/api-docs
      - name: application-service
        url: /application-docs/v3/api-docs
      - name: interaction-service
        url: /interaction-docs/v3/api-docs
      - name: notification-service
        url: /notification-docs/v3/api-docs

app:
  security:
    jwt-secret: ${JWT_SECRET:5d425331c66b17a28480fd38d2128e8350a24d535f23061c8d86bce66bdbcc44}
